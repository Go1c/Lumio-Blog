        <p class="feature__dek">拆解现代渲染管线的每个阶段,结合实际项目讲透 Draw Call 合批、Overdraw 控制与带宽优化的关键决策。</p>

          <span><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3.5" width="11" height="10" rx="1.5"></rect><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3" stroke-linecap="round"></path></svg>2026-05-30</span>
          <span><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5.5"></circle><path d="M8 5v3l2 1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>18 分钟</span>
          <span><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3C4.5 3 2 8 2 8s2.5 5 6 5 6-5 6-5-2.5-5-6-5z"></path><circle cx="8" cy="8" r="2"></circle></svg>3.2k 阅读</span>
        </div>

    <div class="grid-4" id="article-grid"></div>

</div>

<script>
  // 文章数据 —— 后续可由后台 / 接口替换
  const ARTICLES = [
    { t:'渲染优化实战', d:'从原理到实战,深入剖析渲染优化的关键技术与方法。', cat:'渲染', tone:'t-blue', date:'2026-05-28', min:12, art:'<div class="cube float" style="--s:36px; left:42%; top:40%;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube c-mint float" style="--s:28px; left:54%; top:56%; animation-delay:-1.4s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'Unity 性能调优', d:'系统化的性能分析与优化策略,打造流畅稳定的游戏体验。', cat:'性能', tone:'t-mint', date:'2026-05-25', min:15, art:'<div class="cube c-mint float" style="--s:40px; left:50%; top:44%; margin:-20px 0 0 -20px;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'Shader 入门指南', d:'从基础概念到实战案例,快速上手 Shader 编写与调试。', cat:'图形学', tone:'t-amber', date:'2026-05-22', min:10, art:'<div class="orb" style="left:34%;top:30%;"></div><div class="cube c-amber float" style="--s:28px; left:62%; top:60%; animation-delay:-1.2s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'架构设计笔记', d:'分享可扩展、可维护的游戏架构设计思路与最佳实践。', cat:'架构', tone:'t-violet', date:'2026-05-20', min:14, art:'<div class="cube float" style="--s:30px; left:30%; top:36%; --t:#D9D2FF; --r:#B5A6FF; --l:#8E76F0;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube float" style="--s:30px; left:54%; top:52%; --t:#D9D2FF; --r:#B5A6FF; --l:#8E76F0; animation-delay:-1.6s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'网络同步方案', d:'对比主流同步方案,详解实现细节与优化技巧。', cat:'网络', tone:'t-sky', date:'2026-05-18', min:13, art:'<div class="cube float" style="--s:28px; left:26%; top:34%; --t:#BFE6FF; --r:#86C8FF; --l:#4FA0E8;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube float" style="--s:28px; left:56%; top:34%; --t:#BFE6FF; --r:#86C8FF; --l:#4FA0E8; animation-delay:-1s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube float" style="--s:28px; left:42%; top:58%; --t:#BFE6FF; --r:#86C8FF; --l:#4FA0E8; animation-delay:-2s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'工具链提效', d:'精选工具与自动化流程,全面提升开发效率与协作体验。', cat:'工具', tone:'t-rose', date:'2026-05-15', min:11, art:'<div class="cube c-pink float" style="--s:38px; left:50%; top:46%; margin:-19px 0 0 -19px;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'光照与阴影系统', d:'实时光照、阴影贴图与全局光照的实现取舍与性能平衡。', cat:'图形学', tone:'t-amber', date:'2026-05-12', min:16, art:'<div class="orb" style="left:36%;top:28%;"></div>' },
    { t:'内存管理与 GC 优化', d:'定位内存峰值、降低 GC 抖动,稳住帧率的实战手册。', cat:'性能', tone:'t-mint', date:'2026-05-09', min:13, art:'<div class="cube c-mint float" style="--s:34px; left:40%; top:42%;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube c-mint float" style="--s:26px; left:58%; top:56%; animation-delay:-1.3s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' },
    { t:'ECS 架构落地实践', d:'数据驱动设计如何在真实项目中提升性能与可维护性。', cat:'架构', tone:'t-violet', date:'2026-05-06', min:15, art:'<div class="cube float" style="--s:28px; left:28%; top:34%; --t:#D9D2FF; --r:#B5A6FF; --l:#8E76F0;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div><div class="cube float" style="--s:28px; left:56%; top:34%; --t:#D9D2FF; --r:#B5A6FF; --l:#8E76F0; animation-delay:-1s;"><i class="f-t"></i><i class="f-l"></i><i class="f-r"></i></div>' }
  ];
  const meta = (a) => `
    <div class="card__meta">
      <span><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="3.5" width="11" height="10" rx="1.5"></rect><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3" stroke-linecap="round"></path></svg>${a.date}</span>
      <span><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5.5"></circle><path d="M8 5v3l2 1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>${a.min} 分钟</span>
    </div>`;
  document.getElementById('article-grid').innerHTML = ARTICLES.map(a => `
    <article class="card">
      <div class="thumb ${a.tone}">
        <div class="thumb__grid"></div>
        <span class="badge">${a.cat}</span>
        <div class="thumb__art">${a.art}</div>
      </div>
      <div class="card__body">
        <h3 class="card__title">${a.t}</h3>
        <p class="card__dek">${a.d}</p>
        ${meta(a)}
      </div>
    </article>`).join('');

  // chip filter
  document.querySelectorAll('.chips .chip').forEach(c => {
    if (c.style.cursor === 'default') return;
    c.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('#article-grid ~ *, .chips .chip').forEach(x=>{});
      document.querySelectorAll('.page > .chips .chip').forEach(x => x.classList.remove('is-active'));
      c.classList.add('is-active');
      const cat = c.firstChild.textContent.trim();
      const list = cat === '全部' ? ARTICLES : ARTICLES.filter(a => a.cat === cat);
      document.getElementById('article-grid').innerHTML = list.map(a => `
        <article class="card">
          <div class="thumb ${a.tone}"><div class="thumb__grid"></div><span class="badge">${a.cat}</span><div class="thumb__art">${a.art}</div></div>
          <div class="card__body"><h3 class="card__title">${a.t}</h3><p class="card__dek">${a.d}</p>${meta(a)}</div>
        </article>`).join('') || '<p style="color:var(--muted);font-family:var(--font-zh);padding:20px;">该分类暂无文章</p>';
    });
  });
</script>
